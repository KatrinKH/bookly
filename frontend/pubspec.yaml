name: bookly
description: "Bookly — мобильное приложение для управления личной библиотекой с читалкой, заметками и статистикой чтения"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Шрифты Google Fonts (Lobster для текста, Pacifico для бренда)
  google_fonts: ^6.2.1

  # Сетевые запросы к backend API
  http: ^1.2.2
  dio: ^5.7.0

  # Хранение токена авторизации и настроек на устройстве
  shared_preferences: ^2.3.2

  # Просмотр PDF
  syncfusion_flutter_pdfviewer: ^27.1.48

  # Просмотр EPUB (вертикальный скролл, надёжное сохранение позиции через CFI)
  flutter_epub_viewer: ^1.2.7

  # Графики для экрана статистики
  fl_chart: ^0.69.0

  # Выбор файла книги/обложки с устройства
  file_picker: ^8.1.3

  # Доступ к временной папке устройства (для скачивания EPUB перед открытием)
  path_provider: ^2.1.4

  # Форматирование дат
  intl: ^0.19.0

  # Управление состоянием
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
